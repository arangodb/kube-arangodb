  name: arangobackuppolicies.backup.arangodb.com
spec:
  group: backup.arangodb.com
  names:
    kind: ArangoBackupPolicy
    listKind: ArangoBackupPolicyList
    plural: arangobackuppolicies
    shortNames:
      - arangobackuppolicy
