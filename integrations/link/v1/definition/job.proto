syntax = "proto3";

package connector;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/arangodb/kube-arangodb/integrations/link/v1/definition";

// Job state
enum JobState {
  // Job submitted, waiting to be picked up by a link
  JOB_STATE_PENDING = 0;
  // Job picked up by connector handler, awaiting execution
  JOB_STATE_SCHEDULED = 1;
  // link is executing the job on remote source
  JOB_STATE_RUNNING = 2;
  // Execution finished, results available in FileStore
  JOB_STATE_COMPLETED = 3;
  // Execution failed. Description field describes the failure (includes timeout)
  JOB_STATE_FAILED = 4;
  // Cancelled by AI tool from Pending, Scheduled, or Running state
  JOB_STATE_CANCELLED = 5;
}

// Job status
message JobStatus {
  // Current state
  JobState state = 1;
  // Human-readable description of the current status
  string description = 2;
  // Timestamp when status was last updated
  google.protobuf.Timestamp updated = 3;
}

// Job represents a unit of work submitted to a link
message Job {
  // Unique job identifier (UUID)
  string id = 1;
  // Link UUID that owns this job
  string link_id = 2;
  // Handler UUID that picked up this job (set when Scheduled)
  optional string handler_id = 3;
  // Status history (most recent first, max 10 entries). First element is the current status
  repeated JobStatus statuses = 4;
  // Query as JSON (validated against connector's JSON Schema)
  bytes query = 5;
  // Per-job timeout requested by the caller. If not set, no timeout
  optional google.protobuf.Duration timeout = 6;
  // Timestamp when job was created
  google.protobuf.Timestamp created = 7;
  // Result path in FileStore (set when job is Completed)
  // Path format: /links/<link_id>/<job_id>/
  optional string result = 8;
}
