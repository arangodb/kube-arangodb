syntax = "proto3";

package connector;

import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "integrations/connector/v1/definition/job.proto";

option go_package = "github.com/arangodb/kube-arangodb/integrations/connector/v1/definition";

// ConnectorV1External — Public API used by AI tools to submit and manage jobs
service ConnectorV1External {
  // Submit a new job to a connector
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse) {
    option (google.api.http) = {
      post: "/_integration/connector/v1/job"
      body: "*"
    };
  }

  // Get job status and metadata
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {
    option (google.api.http) = {
      get: "/_integration/connector/v1/job/{id}"
    };
  }

  // List jobs, optionally filtered by connector or state
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/_integration/connector/v1/job"
    };
  }

  // Cancel a pending or running job
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse) {
    option (google.api.http) = {
      post: "/_integration/connector/v1/job/{id}/cancel"
    };
  }

}

// Create Job Request
message CreateJobRequest {
  // Query as JSON (must match connector's JSON Schema)
  bytes query = 1;
  // Per-job timeout. If not set, no timeout
  optional google.protobuf.Duration timeout = 2;
}

// Create Job Response
message CreateJobResponse {
  // Unique job identifier
  string id = 1;
}

// Get Job Request
message GetJobRequest {
  // Job identifier
  string id = 1;
}

// Get Job Response
message GetJobResponse {
  // Job details
  Job job = 1;
}

// List Jobs Request
message ListJobsRequest {
  // Filter by job state (optional)
  optional JobState state = 1;
}

// List Jobs Response
message ListJobsResponse {
  // List of jobs
  repeated Job jobs = 1;
}

// Cancel Job Request
message CancelJobRequest {
  // Job identifier
  string id = 1;
}

// Cancel Job Response
message CancelJobResponse {
  // Job details after cancellation
  Job job = 1;
}

