syntax = "proto3";

package shared;

option go_package = "github.com/arangodb/kube-arangodb/integrations/shared/v1/definition";

// OffsetRequest requested offset details
message OffsetRequest {
  // Items Per Page
  optional int32 items_per_page = 1;

  // Page ID
  optional int32 page = 2;
}

// OffsetRequest requested offset details
message OffsetResponse {
  // Items Per Page
  int32 items = 1;

  // Page ID
  int32 page = 2;
}
