syntax = "proto3";

package inventory;

option go_package = "github.com/arangodb/kube-arangodb/integrations/inventory/v1/definition";

// Platform Inventory
message Inventory {
  // Current Envoy Configuration details
  optional InventoryConfiguration configuration = 1;
  // ArangoDB Deployment Configuration
  optional ArangoDBConfiguration arangodb = 2;
  // ArangoDB Platform Networking
  optional InventoryNetworking networking = 3;
  // ArangoDB Platform Spec
  optional InventoryPlatform platform = 4;
  // ArangoDB Profiles
  map<string, InventoryProfile> profiles = 5;
  // Platform Security Configuration
  optional InventorySecurity security = 6;
}

// Platform Inventory Hash
message InventoryHash {
  // Current Envoy Configuration hash
  string hash = 1;
}

// Envoy Configuration details
message InventoryConfiguration {
  // Configuration hash
  string hash = 1;
}

// Platform Configuration details
message InventoryPlatform {
  // Defines Services definition
  map<string, InventoryPlatformService> services = 1;
}

// Envoy Service Configuration details
message InventoryPlatformService {
  // Service Version
  string version = 1;

  // Defines if Service is Ready
  bool ready = 2;
}

// Envoy Configuration details
message InventoryNetworking {
  // Defines Routes definition
  map<string, InventoryNetworkingRoute> routes = 1;
}

// Envoy Route Configuration details
message InventoryNetworkingRoute {
  oneof route {
    // Path Route
    InventoryNetworkingRoutePath path = 1;
  }
}

// Envoy Route Path Configuration details
message InventoryNetworkingRoutePath {
  // Path definition
  string path = 1;
}

// ArangoDB Deployment Mode
enum ArangoDBMode {
  // Single Mode
  Single = 0;
  // ActiveFailover Mode
  ActiveFailover = 1;
  // Cluster Mode
  Cluster = 2;
}

// ArangoDB Deployment Edition
enum ArangoDBEdition {
  // Community Edition
  Community = 0;
  // Enterprise Edition
  Enterprise = 1;
}

// ArangoDB Sharding Mode
enum ArangoDBSharding {
  // Sharded Sharding Mode
  Sharded = 0;
  // OneShardEnforced Sharding Mode
  OneShardEnforced = 1;
}

// ArangoDB Deployment Configuration
message ArangoDBConfiguration {
  // ArangoDB Deployment Mode
  ArangoDBMode mode = 1;
  // ArangoDB Deployment Edition
  ArangoDBEdition edition = 2;
  // ArangoDB Deployment Version
  string version = 3;
  // ArangoDB Sharding Mode
  ArangoDBSharding sharding = 4;
}

// ArangoDB Profile details
message InventoryProfile {
  // Profile Description
  string description = 1;
  // Profile Tags
  repeated string tags = 2;
}

// Security Authentication Type
enum SecurityAuthenticationType {
  // No Authentication - ArangoDB JWT authentication is disabled (JWTSecretName set to "None")
  AuthenticationNone = 0;
  // Native ArangoDB Authentication - ArangoDB JWT authentication is enabled (default)
  AuthenticationNative = 1;
  // SSO Authentication - Gateway OpenID (SSO) authentication is configured
  AuthenticationSSO = 2;
}

// Security Authorization Type
enum SecurityAuthorizationType {
  // No Authorization - ArangoDB authentication is disabled, no authorization is performed
  AuthorizationNone = 0;
  // Native ArangoDB Authorization - ArangoDB built-in user permissions are used
  AuthorizationNative = 1;
  // RBAC Authorization - Platform Gateway sidecar is enabled, RBAC policies are enforced
  AuthorizationRBAC = 2;
}

// Platform Security Configuration
message InventorySecurity {
  // Authentication Type
  SecurityAuthenticationType authentication = 1;
  // Authorization Type
  SecurityAuthorizationType authorization = 2;
}