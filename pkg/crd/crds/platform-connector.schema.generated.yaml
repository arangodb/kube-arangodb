v1beta1:
  openAPIV3Schema:
    properties:
      spec:
        properties:
          deployment:
            description: |-
              Deployment is a reference to the ArangoDeployment that this connector belongs to.
              Set by the user. Must point to an existing ArangoDeployment in the same namespace.
              The operator verifies the deployment exists and sets the DeploymentFound condition.
            properties:
              name:
                description: Name of the object
                type: string
            required:
              - name
            type: object
          description:
            description: |-
              Description is a human-readable text explaining what this connector does.
              Shown to AI tools via /_inventory for discovery. Set by the user.
              Example: "Execute AQL queries on ArangoDB"
            type: string
          route:
            description: |-
              Route is a reference to the ArangoRoute that exposes this connector's external API
              at a user-friendly path (e.g. /connector/<name>/). The route should redirect to
              /_integration/connector/v1/ so that AI tools can use a clean per-connector URL.
              Set by the user. The operator verifies the route exists and sets the RouteFound condition.
            properties:
              name:
                description: Name of the object
                type: string
            required:
              - name
            type: object
          schema:
            description: |-
              Schema defines the JSON Schema that describes the expected format of the query
              field when submitting jobs to this connector. AI tools read this from /_inventory
              to validate input before creating a job. Set by the user.
              Uses the standard Kubernetes JSONSchemaProps format (same as CRD validation schemas).
              The platform validates submitted job queries against this schema.
            properties:
              $ref:
                type: string
              $schema:
                type: string
              additionalItems:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              additionalProperties:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              allOf:
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              anyOf:
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              default:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              definitions:
                additionalProperties:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: object
              dependencies:
                additionalProperties:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: object
              description:
                type: string
              enum:
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              example:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              exclusiveMaximum:
                type: boolean
              exclusiveMinimum:
                type: boolean
              externalDocs:
                properties:
                  description:
                    type: string
                  url:
                    type: string
                type: object
              format:
                type: string
              id:
                type: string
              items:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              maxItems:
                format: int64
                type: integer
              maxLength:
                format: int64
                type: integer
              maxProperties:
                format: int64
                type: integer
              maximum:
                format: double
                type: number
              minItems:
                format: int64
                type: integer
              minLength:
                format: int64
                type: integer
              minProperties:
                format: int64
                type: integer
              minimum:
                format: double
                type: number
              multipleOf:
                format: double
                type: number
              not:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              nullable:
                type: boolean
              oneOf:
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: array
              pattern:
                type: string
              patternProperties:
                additionalProperties:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: object
              properties:
                additionalProperties:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                type: object
              required:
                items:
                  type: string
                type: array
              title:
                type: string
              type:
                type: string
              uniqueItems:
                type: boolean
              x-kubernetes-embedded-resource:
                type: boolean
              x-kubernetes-int-or-string:
                type: boolean
              x-kubernetes-list-map-keys:
                items:
                  type: string
                type: array
              x-kubernetes-list-type:
                type: string
              x-kubernetes-map-type:
                type: string
              x-kubernetes-preserve-unknown-fields:
                type: boolean
              x-kubernetes-validations:
                items:
                  properties:
                    fieldPath:
                      type: string
                    message:
                      type: string
                    messageExpression:
                      type: string
                    optionalOldSelf:
                      type: boolean
                    reason:
                      type: string
                    rule:
                      type: string
                  type: object
                type: array
            type: object
            x-kubernetes-preserve-unknown-fields: true
          tags:
            description: |-
              Tags are labels used by AI tools to discover and filter connectors via /_inventory.
              Set by the user. Use lowercase, descriptive terms.
              Example: ["database", "aql", "query"]
            items:
              type: string
            type: array
          type:
            description: |-
              Type defines the connector execution pattern.
              Currently only "Active" is supported — the connector runs as a long-lived process
              that polls for pending jobs and processes them sequentially.
              Set by the user when creating the connector. Defaults to "Active" if omitted.
            enum:
              - Active
            type: string
          version:
            description: |-
              Version is the version string of the connector implementation.
              Set by the user. Shown to AI tools via /_inventory. No format enforced,
              but semantic versioning (e.g. "1.0.0") is recommended.
            type: string
        type: object
      status:
        description: Object with preserved fields for backward compatibility
        type: object
        x-kubernetes-preserve-unknown-fields: true
    type: object
