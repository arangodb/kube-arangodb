v1alpha1:
  openAPIV3Schema:
    properties:
      spec:
        properties:
          deployment:
            description: Deployment keeps the Deployment Reference
            properties:
              name:
                description: Name of the object
                type: string
            required:
              - name
            type: object
          policy:
            description: Policy defines an inline authorization policy to create for this token
            properties:
              description:
                description: Description is an optional human-readable description of this policy
                type: string
              statements:
                description: Statements list of the policy Statements
                items:
                  properties:
                    actions:
                      description: |-
                        Actions defines the list of actions.
                        Action needs to be defined in format `<namespace>:<name>`
                      items:
                        type: string
                      type: array
                    description:
                      description: Description is an optional human-readable description of what this statement does
                      type: string
                    effect:
                      description: Effect defines the statement effect.
                      enum:
                        - Allow
                        - Deny
                      type: string
                    resources:
                      description: Resources defines the list of resources
                      items:
                        type: string
                      type: array
                  required:
                    - actions
                    - effect
                    - resources
                  type: object
                type: array
            required:
              - statements
            type: object
          roles:
            description: |-
              Roles keeps the scoped role references assigned to the token.
              Each entry binds a role with a required scope boundary.
            items:
              properties:
                role:
                  description: Role references an ArangoPermissionRole CRD by name
                  properties:
                    direct:
                      description: |-
                        Direct references an existing authorization object (role or policy) by its exact name, without
                        a backing ArangoPermission CRD - e.g. an operator-managed predefined role
                        "managed:predefined:coredb-reader". The value is used as-is. Exactly one of Name or Direct
                        must be set.
                      type: string
                    name:
                      description: Name references an ArangoPermission CRD by name. The operator resolves it to the sidecar name.
                      type: string
                  type: object
                scope:
                  description: Scope defines the boundary for this role binding
                  properties:
                    policy:
                      description: Policy defines the boundary policy inline
                      properties:
                        description:
                          description: Description is an optional human-readable description of this policy
                          type: string
                        statements:
                          description: Statements list of the policy Statements
                          items:
                            properties:
                              actions:
                                description: |-
                                  Actions defines the list of actions.
                                  Action needs to be defined in format `<namespace>:<name>`
                                items:
                                  type: string
                                type: array
                              description:
                                description: Description is an optional human-readable description of what this statement does
                                type: string
                              effect:
                                description: Effect defines the statement effect.
                                enum:
                                  - Allow
                                  - Deny
                                type: string
                              resources:
                                description: Resources defines the list of resources
                                items:
                                  type: string
                                type: array
                            required:
                              - actions
                              - effect
                              - resources
                            type: object
                          type: array
                      required:
                        - statements
                      type: object
                    ref:
                      description: Ref references an ArangoPermissionPolicy CRD to use as boundary
                      properties:
                        direct:
                          description: |-
                            Direct references an existing authorization object (role or policy) by its exact name, without
                            a backing ArangoPermission CRD - e.g. an operator-managed predefined role
                            "managed:predefined:coredb-reader". The value is used as-is. Exactly one of Name or Direct
                            must be set.
                          type: string
                        name:
                          description: Name references an ArangoPermission CRD by name. The operator resolves it to the sidecar name.
                          type: string
                      type: object
                  type: object
              required:
                - role
                - scope
              type: object
            type: array
          scope:
            description: Scope defines the boundary policy that constrains what the referenced policy can grant on this token's managed role
            properties:
              description:
                description: Description is an optional human-readable description of this policy
                type: string
              statements:
                description: Statements list of the policy Statements
                items:
                  properties:
                    actions:
                      description: |-
                        Actions defines the list of actions.
                        Action needs to be defined in format `<namespace>:<name>`
                      items:
                        type: string
                      type: array
                    description:
                      description: Description is an optional human-readable description of what this statement does
                      type: string
                    effect:
                      description: Effect defines the statement effect.
                      enum:
                        - Allow
                        - Deny
                      type: string
                    resources:
                      description: Resources defines the list of resources
                      items:
                        type: string
                      type: array
                  required:
                    - actions
                    - effect
                    - resources
                  type: object
                type: array
            required:
              - statements
            type: object
          ttl:
            description: TTL Defines the TTL of the token.
            type: string
        required:
          - deployment
        type: object
      status:
        description: Object with preserved fields for backward compatibility
        type: object
        x-kubernetes-preserve-unknown-fields: true
    type: object
