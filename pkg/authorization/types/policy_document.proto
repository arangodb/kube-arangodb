syntax = "proto3";

package types;

import "pkg/authorization/types/change.proto";
import "pkg/authorization/types/policy.proto";

option go_package = "github.com/arangodb/kube-arangodb/pkg/authorization/types";

// PolicyDocument Object Definition
message PolicyDocument {
  // ArangoDB Document Key
  string key = 1  [json_name = "_key"];
  // ArangoDB Document ID
  string id = 2  [json_name = "_id"];
  // ArangoDB Document Revision
  optional string rev = 3 [json_name = "_rev"];

  // Sequence ID of the Document
  uint64 sequence = 4;

  // Object Spec
  Policy spec = 5;

  // Creation details
  DocumentChange created = 6;

  // Deletion details
  optional DocumentChange deleted = 7;
}