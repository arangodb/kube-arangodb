syntax = "proto3";

package service;

import "google/api/annotations.proto";

import "integrations/shared/v1/definition/offset.proto";

import "pkg/sidecar/services/authorization/types/context.proto";
import "pkg/sidecar/services/authorization/types/effect.proto";
import "pkg/sidecar/services/authorization/types/policy.proto";
import "pkg/sidecar/services/authorization/types/role.proto";
import "pkg/sidecar/services/authorization/types/user_role_binding.proto";

option go_package = "github.com/arangodb/kube-arangodb/pkg/sidecar/services/authorization/definition";

// AuthorizationAPI Service implementation
service AuthorizationAPI {
  // Create the Policy
  rpc ValidateSelfPermission(AuthorizationAPIValidateSelfRequest) returns (AuthorizationAPIValidateResponse){
    option (google.api.http) = {
      post: "/_management/permissions/validate"
      body: "*"
    };
  }

  // Return the Policies
  rpc APIListPolicy(shared.OffsetRequest) returns (AuthorizationAPIListResponse){
    option (google.api.http) = {
      get: "/_management/permissions/policy"
    };
  }

  // Return the Policy
  rpc APIGetPolicy(AuthorizationAPINamedRequest) returns (AuthorizationAPIPolicyResponse){
    option (google.api.http) = {
      get: "/_management/permissions/policy/{name}"
    };
  }

  // Delete the Policy
  rpc APIDeletePolicy(AuthorizationAPINamedRequest) returns (AuthorizationAPIPolicyResponse){
    option (google.api.http) = {
      delete: "/_management/permissions/policy/{name}"
    };
  }

  // Create the Policy
  rpc APICreatePolicy(AuthorizationAPIPolicyRequest) returns (AuthorizationAPIPolicyResponse){
    option (google.api.http) = {
      post: "/_management/permissions/policy/{name}"
      body: "*"
    };
  }

  // Update the Policy
  rpc APIUpdatePolicy(AuthorizationAPIPolicyRequest) returns (AuthorizationAPIPolicyResponse){
    option (google.api.http) = {
      put: "/_management/permissions/policy/{name}"
      body: "*"
    };
  }

  // Return the Roles
  rpc APIListRole(shared.OffsetRequest) returns (AuthorizationAPIListResponse){
    option (google.api.http) = {
      get: "/_management/permissions/role"
    };
  }

  // Returns the Role
  rpc APIGetRole(AuthorizationAPINamedRequest) returns (AuthorizationAPIRoleResponse){
    option (google.api.http) = {
      get: "/_management/permissions/role/{name}"
    };
  }

  // Delete the Role
  rpc APIDeleteRole(AuthorizationAPINamedRequest) returns (AuthorizationAPIRoleResponse){
    option (google.api.http) = {
      delete: "/_management/permissions/role/{name}"
    };
  }

  // Create the Role
  rpc APICreateRole(AuthorizationAPIRoleRequest) returns (AuthorizationAPIRoleResponse){
    option (google.api.http) = {
      post: "/_management/permissions/role/{name}"
      body: "*"
    };
  }

  // Update the Role
  rpc APIUpdateRole(AuthorizationAPIRoleRequest) returns (AuthorizationAPIRoleResponse){
    option (google.api.http) = {
      put: "/_management/permissions/role/{name}"
      body: "*"
    };
  }

  // List all role bindings for a user
  rpc APIListUserRoleBindings(AuthorizationAPIUserRequest) returns (AuthorizationAPIUserRoleBindingListResponse){
    option (google.api.http) = {
      get: "/_management/permissions/user/{user}/role"
    };
  }

  // Assign a role with scope to a user
  rpc APIAssignUserRole(AuthorizationAPIUserRoleBindingRequest) returns (AuthorizationAPIUserRoleBindingResponse){
    option (google.api.http) = {
      post: "/_management/permissions/user/{user}/role/{role}"
      body: "*"
    };
  }

  // Remove a role from a user
  rpc APIRemoveUserRole(AuthorizationAPIUserRoleRequest) returns (AuthorizationAPIUserRoleBindingResponse){
    option (google.api.http) = {
      delete: "/_management/permissions/user/{user}/role/{role}"
    };
  }

  // Replace the scope for a role binding of a user
  rpc APIReplaceUserRoleScope(AuthorizationAPIUserRoleBindingRequest) returns (AuthorizationAPIUserRoleBindingResponse){
    option (google.api.http) = {
      put: "/_management/permissions/user/{user}/role/{role}"
      body: "*"
    };
  }

  // Refresh all poolers and return once completed
  rpc APIRefresh(AuthorizationAPIRefreshRequest) returns (AuthorizationAPIRefreshResponse){
    option (google.api.http) = {
      post: "/_management/permissions/refresh"
      body: "*"
    };
  }
}

// AuthorizationAPI Refresh Request
message AuthorizationAPIRefreshRequest {
}

// AuthorizationAPI Refresh Response
message AuthorizationAPIRefreshResponse {
}

// AuthorizationAPI Name based request
message AuthorizationAPINamedRequest {
  // Name of the object
  string name = 1;
}

// AuthorizationAPI List Response
message AuthorizationAPIListResponse {
  // List of the names
  repeated string names = 1;

  // Page details
  optional shared.OffsetResponse page = 2;
}

// AuthorizationAPI Policy Request
message AuthorizationAPIPolicyRequest {
  // Name of the Policy
  string name = 1;

  // Policy spec
  types.Policy item = 2;
}

// AuthorizationAPI Policy Response
message AuthorizationAPIPolicyResponse {
  // Name of the Policy
  string name = 1;

  // Policy index
  uint32 index = 2;

  // Policy spec
  types.Policy item = 3;
}

// AuthorizationAPI Role Request
message AuthorizationAPIRoleRequest {
  // Name of the Role
  string name = 1;

  // Role spec
  types.Role item = 2;
}

// AuthorizationAPI Role Response
message AuthorizationAPIRoleResponse {
  // Name of the Role
  string name = 1;

  // Role index
  uint32 index = 2;

  // Role spec
  types.Role item = 3;
}

// AuthorizationAPI User Request
message AuthorizationAPIUserRequest {
  // Name of the user
  string user = 1;
}

// AuthorizationAPI User Role Request
message AuthorizationAPIUserRoleRequest {
  // Name of the user
  string user = 1;

  // Name of the role
  string role = 2;
}

// AuthorizationAPI User Role Binding Request
message AuthorizationAPIUserRoleBindingRequest {
  // Name of the user
  string user = 1;

  // Name of the role
  string role = 2;

  // Scope policy for this binding
  types.Policy scope = 3;
}

// AuthorizationAPI User Role Binding Response
message AuthorizationAPIUserRoleBindingResponse {
  // Name of the user
  string user = 1;

  // Name of the role
  string role = 2;

  // Scope policy for this binding
  types.Policy scope = 3;
}

// AuthorizationAPI User Role Binding List Response
message AuthorizationAPIUserRoleBindingListResponse {
  // List of role bindings for the user
  repeated types.UserRoleBinding bindings = 1;
}

// AuthorizationAPI Validate Self Request
message AuthorizationAPIValidateSelfRequest {
  // Defines the action
  string action = 1;

  // Defines the resource
  string resource = 2;

  // request context
  optional types.Context context = 3;
}

// AuthorizationAPI Validate Response
message AuthorizationAPIValidateResponse {
  // Message of the Permission evaluation
  string message = 1;

  // Effect of the permission evaluation
  types.Effect effect = 2;
}
