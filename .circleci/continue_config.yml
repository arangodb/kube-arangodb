version: 2.1
orbs:
  slack: circleci/slack@4.1

executors:
  golang-executor:
    docker:
      - image: 889010145541.dkr.ecr.us-east-1.amazonaws.com/cicd/golang:1.24.13
    resource_class: arangodb/amd-2xlarge-amd64

jobs:
  check-code:
    executor: golang-executor
    environment:
      GOCACHE: "/tmp/go/cache"
      GOPATH: "/tmp/go/path"
      GO111MODULES: off
      KEEP_GOPATH: 1
    steps:
      - run: apt-get update && apt-get install -y unzip
      - checkout
      - run:
          name: Run Vendor
          command: make vendor tools-min init
      - run:
          name: License check
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make license-verify license-range-verify
      - run: make fmt-verify
      - run: make yamlfmt-verify
      - run: make linter
      - run:
          name: Unit tests
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make run-unit-tests
      - run:
          name: make bin
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make bin
      - run:
          name: vulncheck
          no_output_timeout: 1.5h
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make vulncheck-optional
      - run:
          name: Check that everything what should be generated is commited
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
            make ci-check

workflows:
  version: 2

  run_tests:
    jobs:
      - check-code