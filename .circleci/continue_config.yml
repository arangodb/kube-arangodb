version: 2.1
orbs:
  slack: circleci/slack@4.1
  trivy-scan: arangodb/trivy-scan@1.0.0

parameters:
  manifests-verify:
    type: boolean
    default: false
  minikube-version:
    type: string
    default: v1.31.2
  helm-version:
    type: string
    default: v3.13.0

executors:
  golang-executor:
    docker:
      - image: 889010145541.dkr.ecr.us-east-1.amazonaws.com/cicd/golang:1.25.9
    resource_class: arangodb/amd-2xlarge-amd64

jobs:
  check-code:
    executor: golang-executor
    environment:
      GOCACHE: "/tmp/go/cache"
      GOPATH: "/tmp/go/path"
      GO111MODULES: off
      KEEP_GOPATH: 1
    steps:
      - run: apt-get update && apt-get install -y unzip
      - checkout
      - run:
          name: Run Vendor
          command: make vendor tools-min init
      - run:
          name: License check
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make license-verify license-range-verify
      - run: make fmt-verify
      - run: make yamlfmt-verify
      - run: make linter
      - run:
          name: Unit tests
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make run-unit-tests
      - run:
          name: make bin
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make bin
      - run:
          name: vulncheck
          no_output_timeout: 1.5h
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
             make vulncheck-optional
      - run:
          name: Check that everything what should be generated is commited
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "This is not a pull request. Skipping..."
              exit 0
            fi
            make ci-check

  dependency-cve-scan:
    executor: golang-executor
    steps:
      - checkout
      - trivy-scan/scan:
          scan-type: fs
          scan-path: "."
          severity: "CRITICAL,HIGH"
          fail-on-findings: false
          store-junit-results: true

  # Image-layer CVE gate (warn-only): the published operator image bundles
  # the base OS packages and the compiled arangodb_operator/envoy binaries,
  # none of which are visible to the fs scan above (pre-build analyzers,
  # lockfiles only). Scans the already-published Docker Hub tag directly via
  # the registry (image-src: remote), so no image build/docker daemon is
  # needed in CI. The tag is read from VERSION rather than hardcoded so the
  # scan tracks whatever this checkout's release line actually ships -
  # the repo's own "latest" Docker Hub tag was found stale (unrelated to any
  # recent release) when this job was added.
  image-cve-scan:
    executor: golang-executor
    steps:
      - checkout
      - run:
          name: Resolve released image tag from VERSION
          command: |
            echo "export OPERATOR_IMAGE_TAG=$(cut -f1 -d'+' VERSION)" >> "$BASH_ENV"
      - trivy-scan/scan:
          scan-type: image
          image-ref: "arangodb/kube-arangodb-enterprise:${OPERATOR_IMAGE_TAG}"
          image-src: remote
          severity: "CRITICAL,HIGH"
          fail-on-findings: false
          store-junit-results: true
          sbom-output: /tmp/sbom-image.cdx.json
      - store_artifacts:
          path: /tmp/sbom-image.cdx.json
          destination: sbom-image.cdx.json

  # Same gate against the UBI9 variant published alongside the Debian-based
  # image - different base OS package set, same operator/envoy binaries.
  image-cve-scan-ubi:
    executor: golang-executor
    steps:
      - checkout
      - run:
          name: Resolve released image tag from VERSION
          command: |
            echo "export OPERATOR_IMAGE_TAG=$(cut -f1 -d'+' VERSION)" >> "$BASH_ENV"
      - trivy-scan/scan:
          scan-type: image
          image-ref: "arangodb/kube-arangodb-enterprise:${OPERATOR_IMAGE_TAG}-ubi"
          image-src: remote
          severity: "CRITICAL,HIGH"
          fail-on-findings: false
          store-junit-results: true
          sbom-output: /tmp/sbom-image.cdx.json
      - store_artifacts:
          path: /tmp/sbom-image.cdx.json
          destination: sbom-image.cdx.json

workflows:
  version: 2

  run_tests:
    jobs:
      - check-code
      - dependency-cve-scan
      - image-cve-scan
      - image-cve-scan-ubi